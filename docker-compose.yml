services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: nkp
      POSTGRES_PASSWORD: nkp
      POSTGRES_DB: nkp_logistics
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nkp -d nkp_logistics"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://nkp:nkp@db:5432/nkp_logistics
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "alembic upgrade head && python -m app.seed && uvicorn app.main:app --host 0.0.0.0 --port 8080"

  web:
    build: ./frontend
    env_file:
      - ./frontend/.env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
    ports:
      - "5001:5001"
    depends_on:
      - api

volumes:
  pgdata:
