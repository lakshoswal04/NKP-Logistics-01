[tool.ruff]
line-length = 110
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["B008"]  # FastAPI's Depends() in defaults is idiomatic

[tool.ruff.lint.per-file-ignores]
"alembic/versions/*" = ["E501"]  # autogenerated
"app/seed.py" = ["E501"]         # tabular demo data reads better unwrapped

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
